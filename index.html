<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thermal Nexus: Pyrodynamic Prototype</title>
    <style>
        body { 
            font-family: monospace; 
            background: #120703; 
            color: #ff6600; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            box-sizing: border-box;
        }
        .game-layout { 
            max-width: 850px; 
            width: 100%; 
            background: #220f06; 
            border: 2px solid #ff4500; 
            border-radius: 8px; 
            padding: 24px; 
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.3); 
            box-sizing: border-box;
        }
        .hud { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid #ff4500; 
            padding-bottom: 12px; 
            font-size: 1rem; 
        }
        .hud strong { color: #ffffff; }
        .ai-select-panel { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin: 15px 0; 
            flex-wrap: wrap;
        }
        .ai-btn { 
            background: #3d1403; 
            color: #ffaa66; 
            border: 1px solid #ff4500; 
            padding: 8px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s;
        }
        .ai-btn:hover { 
            background: #ff4500; 
            color: #000000; 
            box-shadow: 0 0 8px #ff4500;
        }
        .matrix-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 120px); 
            grid-template-rows: repeat(3, 120px); 
            gap: 14px; 
            justify-content: center; 
            margin: 20px auto; 
        }
        .grid-cell { 
            border: 1px dashed #ff6600; 
            background: #1a0a03; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.75rem; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-sizing: border-box; 
            padding: 8px; 
            overflow: hidden;
        }
        .grid-cell:hover { 
            background: rgba(255, 102, 0, 0.2); 
            border-color: #ffffff; 
            transform: scale(1.02);
        }
        .log-box { 
            background: #120703; 
            border: 1px solid #3d1403; 
            border-radius: 4px; 
            padding: 12px; 
            font-size: 0.75rem; 
            height: 75px; 
            overflow-y: auto; 
            color: #ffaa66; 
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .hand-container { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            padding: 15px 0; 
            flex-wrap: wrap;
        }
        .card { 
            width: 140px; 
            height: 190px; 
            border: 1px solid #ff6600; 
            border-radius: 6px; 
            background: #2d1105; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 12px; 
            box-sizing: border-box; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: #ffffff; 
            box-shadow: 0 0 15px #ff4500; 
        }
        .card-title { 
            font-weight: bold; 
            font-size: 0.8rem; 
            border-bottom: 1px solid #ff4500; 
            padding-bottom: 6px; 
            color: #ffcc99; 
            text-transform: uppercase;
        }
        .card-desc { 
            font-size: 0.65rem; 
            color: #d0a080; 
            flex-grow: 1; 
            margin-top: 8px; 
            line-height: 1.3; 
        }
        .card-cost { 
            align-self: flex-end; 
            font-size: 0.75rem; 
            background: rgba(255, 69, 0, 0.4); 
            padding: 2px 8px; 
            border-radius: 4px; 
            color: #ffffff; 
            font-weight: bold;
        }
        .action-container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 10px;
        }
        .action-btn { 
            background: #3d1403; 
            color: #ff6600; 
            border: 1px solid #ff4500; 
            padding: 14px 28px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: monospace; 
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .action-btn:hover { 
            background: #ff4500; 
            color: #000000; 
            box-shadow: 0 0 12px #ff4500; 
        }
        .selected { 
            border-color: #ffffff !important; 
            box-shadow: 0 0 15px #ff6600; 
        }
        .hijack-active {
            background: #000000 !important;
            border-color: #00ff00 !important;
            color: #00ff00 !important;
        }
        .hijack-alert {
            color: #ff3333 !important;
            font-weight: bold;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="game-layout" id="container-box">
    <div class="hud" id="hud-box">
        <div>🔥 PLAYER: <strong id="p-hp">20</strong> HP | <strong id="p-cal">3</strong>/3 Calories</div>
        <div>🤖 <span id="ai-name">Pyrolympian-01</span> (RANK <span id="ai-rank">1</span>): <strong id="ai-hp">20</strong> HP</div>
    </div>

    <div class="ai-select-panel" id="ai-panel">
        <button class="ai-btn" onclick="selectOpponent(0)">Engage: Pyrolympian-01</button>
        <button class="ai-btn" onclick="selectOpponent(1)">Engage: Dynamancer-02</button>
        <button class="ai-btn" onclick="selectOpponent(2)">Engage: Flame Beautitian-03</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>
    <div class="log-box" id="combat-log">[SYSTEM_INITIALIZATION]: Volcanic Grid synchronized. Ready to initialize.</div>
    <div class="hand-container" id="hand"></div>

    <div class="action-container">
        <button class="action-btn" id="end-turn-btn">TRIGGER COMBUSTION PHASE</button>
    </div>
</div>
  <script>
// --- GLOBAL DYNAMIC STATE STORAGE SYSTEM ---
const opponentsRegistry = [
    { name: "Pyrolympian-01 (The Gasifier)", rank: 1, baseHp: 20, style: "Fuel" },
    { name: "Dynamancer-02 (The Chemical Ratio)", rank: 1, baseHp: 22, style: "Oxidizer" },
    { name: "Flame Beautitian-03 (The Subsonic Front)", rank: 1, baseHp: 25, style: "Blast" }
];

const state = {
    activeAiIndex: 0,
    playerHp: 20,
    playerCal: 3,
    aiHp: 20,
    selectedCardIdx: null,
    grid: Array(9).fill(null),
    playerHand: [],
    // COMPLETE THERMAL DATA DICTIONARY DECK ARCHITECTURE
    pool: [
        { title: "Peat Brick", type: "Fuel", cost: 1, val: 2, text: "Ignition point: Low. Spreads 2 raw heating units to its core layer." },
        { title: "Oxygen Jet", type: "Oxidizer", cost: 1, val: 3, text: "Feeds flame streams. Multiplies an active Fuel cell's output parameters by +3." },
        { title: "Char Wood", type: "Fuel", cost: 2, val: 5, text: "High density. Emits 5 massive damage units across uncontained channels." },
        { title: "Backdraft", type: "Blast", cost: 2, val: 4, text: "Tactical flash sweep. Discards an opponent's card parameter completely." },
        { title: "Magma Pulse", type: "Blast", cost: 3, val: 6, text: "Tectonic eruption waves. Smashes 6 global damage points straight down the core." }
    ]
};

// AUTHENTIC GEOLOGICAL LAYER DATA BLUEPRINT ARRAY
const geoLayers = [
    "Lithosphere", "Asthenosphere", "Upper Mantle",
    "Transition Zone", "Lower Mantle", "D\" Layer (CMB)",
    "Outer Core", "Inner Core", "Bullen Discontinuity"
];

function logMessage(text) {
    const logBox = document.getElementById("combat-log");
    logBox.innerHTML += `<br>${text}`;
    logBox.scrollTop = logBox.scrollHeight;
}

function selectOpponent(idx) {
    state.activeAiIndex = idx;
    const enemy = opponentsRegistry[idx];
    
    // VISIBLE EVOLUTION SCALING STATE MATH
    state.aiHp = enemy.baseHp + (enemy.rank - 1) * 5; 
    state.playerHp = 20;
    state.playerCal = 3;
    state.grid.fill(null);
    state.selectedCardIdx = null;
    
    document.getElementById("ai-name").innerText = enemy.name;
    document.getElementById("ai-rank").innerText = enemy.rank;
    document.getElementById("ai-hp").innerText = state.aiHp;
    document.getElementById("p-hp").innerText = state.playerHp;
    document.getElementById("p-cal").innerText = state.playerCal;
    
    logMessage(`[GEOLOGICAL_TUNING]: Calibrated to ${enemy.name}. Battle initialized.`);
    dealHand();
    renderMatrix();
}

function dealHand() {
    state.playerHand = [];
    for(let i = 0; i < 3; i++) {
        const randCard = state.pool[Math.floor(Math.random() * state.pool.length)];
        state.playerHand.push({...randCard});
    }
    renderHand();
}
function renderMatrix() {
    const container = document.getElementById("matrix");
    container.innerHTML = "";
    
    state.grid.forEach((cell, idx) => {
        const div = document.createElement("div");
        div.className = "grid-cell";
        
        if (cell) {
            // Distinct user and enemy thermal colors
            div.style.color = cell.owner === "Player" ? "#ffaa66" : "#ff3300";
            div.style.borderColor = cell.owner === "Player" ? "#ffaa66" : "#ff3300";
            div.innerHTML = `<strong>${cell.title}</strong><br>${cell.owner === "Player" ? '🔥 [USER]' : '💀 [AI]'}`;
        } else {
            // Pristine deep earth geological mapping
            div.innerHTML = `<span style='color: #8b949e; font-size: 0.6rem;'>LAYER_${idx + 1}</span><br><strong style='color: #ff9933;'>${geoLayers[idx]}</strong>`;
        }
        
        div.onclick = () => playCardToGrid(idx);
        container.appendChild(div);
    });
}

function renderHand() {
    const container = document.getElementById("hand");
    container.innerHTML = "";
    
    state.playerHand.forEach((card, idx) => {
        const div = document.createElement("div");
        div.className = `card ${state.selectedCardIdx === idx ? 'selected' : ''}`;
        div.onclick = () => {
            state.selectedCardIdx = state.selectedCardIdx === idx ? null : idx;
            renderHand();
        };
        
        div.innerHTML = `
            <div class="card-title">${card.title}</div>
            <div class="card-desc">${card.text}</div>
            <div class="card-cost">${card.cost} Cal</div>
        `;
        container.appendChild(div);
    });
}

function playCardToGrid(cellIdx) {
    if (state.selectedCardIdx === null) return;
    const card = state.playerHand[state.selectedCardIdx];

    if (state.playerCal < card.cost) {
        alert("[THERMAL DISK FAULT]: Insufficient Calories to execute chemical combustion.");
        return;
    }
    if (state.grid[cellIdx] !== null) {
        alert("[COLLISION ERROR]: Selected geological layer already registers active data matter.");
        return;
    }

    // Assign card to the Volcanic Grid
    state.grid[cellIdx] = { ...card, owner: "Player" };
    state.playerCal -= card.cost;
    
    // Core combat damage projection
    if (card.type === "Fuel" || card.type === "Blast") {
        state.aiHp -= card.val;
        logMessage(`[USER_ACTION]: Cast ${card.title} on ${geoLayers[cellIdx]}. Dealt ${card.val} Thermal Damage.`);
    }

    state.playerHand.splice(state.selectedCardIdx, 1);
    state.selectedCardIdx = null;

    updateHud();
    renderMatrix();
    renderHand();
    checkVictoryConditions();
}

function updateHud() {
    document.getElementById("p-hp").innerText = state.playerHp;
    document.getElementById("p-cal").innerText = state.playerCal;
    document.getElementById("ai-hp").innerText = state.aiHp;
}

function runEnemyAiCycle() {
    if (isHijackActive) return; // Keep system frozen during background lockdowns
    logMessage(`[SYSTEM_EXECUTION]: Boss calculating next tectonic thermal vector...`);
    
    const enemy = opponentsRegistry[state.activeAiIndex];
    let emptyCells = [];
    state.grid.forEach((c, i) => { if (c === null) emptyCells.push(i); });

    if (emptyCells.length > 0) {
        const targetCell = emptyCells[Math.floor(Math.random() * emptyCells.length)];
        const aiCard = state.pool[Math.floor(Math.random() * state.pool.length)];
        
        // DYNAMIC STATE UPGRADE: AI power calculation scales perfectly with Rank
        const scalingBonus = Math.floor((enemy.rank - 1) * 1.5);
        const finalOutput = aiCard.val + scalingBonus;

        state.grid[targetCell] = { ...aiCard, title: `⚡ ${aiCard.title}`, owner: "AI" };
        state.playerHp -= finalOutput;
        
        logMessage(`[AI_COMBAT]: ${enemy.name} deployed ${aiCard.title} to ${geoLayers[targetCell]}. Projected ${finalOutput} Burn (Rank Bonus: +${scalingBonus}).`);
    }
    
    state.playerCal = 3; 
    updateHud();
    renderMatrix();
    dealHand();
    checkVictoryConditions();
}
function checkVictoryConditions() {
    // 1. CHANNELS SCANNER: Validate Flash Overdrive 3-in-a-row rows
    const winLines = [, [3, 4, 5], [6, 7, 8], // Horizontal, [1, 4, 7], [2, 5, 8], // Vertical, [2, 4, 6]             // Diagonal
    ];

    let playerFlashOverdrive = false;
    let aiFlashOverdrive = false;

    for (let line of winLines) {
        const [a, b, c] = line;
        if (state.grid[a] && state.grid[b] && state.grid[c]) {
            if (state.grid[a].owner === "Player" && state.grid[b].owner === "Player" && state.grid[c].owner === "Player") {
                playerFlashOverdrive = true;
                break;
            }
            if (state.grid[a].owner === "AI" && state.grid[b].owner === "AI" && state.grid[c].owner === "AI") {
                aiFlashOverdrive = true;
                break;
            }
        }
    }

    // 2. TRIGGER TERMINAL OVERRIDE PATHS
    if (state.aiHp <= 0 || playerFlashOverdrive) {
        const enemy = opponentsRegistry[state.activeAiIndex];
        enemy.rank += 1; // SCALE STRENGTH RANK ON DEFEAT
        
        let victoryReason = playerFlashOverdrive ? 
            "[FLASH OVERDRIVE]: Three layers aligned! The Volcanic Grid has achieved thermonuclear ignition!" : 
            "[CORE INCINERATED]: Opponent's thermal shielding reduced to absolute zero!";
            
        alert(`${victoryReason}\n\nVictory achieved! ${enemy.name} has re-calibrated and grown stronger. Rank upgraded to: ${enemy.rank}`);
        selectOpponent(state.activeAiIndex);
    } else if (state.playerHp <= 0 || aiFlashOverdrive) {
        let lossReason = aiFlashOverdrive ? 
            "[AI FLASH OVERDRIVE]: The boss aligned three layers and trapped your fuel stream!" : 
            "[CRITICAL SHIELD FAULT]: Your system reached flashover thermal breakdown!";
            
        alert(`${lossReason}\n\nSession reset. Re-calibrating parameters.`);
        selectOpponent(state.activeAiIndex);
    }
}

// --- HIGH-FREQUENCY SPAM RE-CALIBRATION RUNTIME SYSTEM ---
let isHijackActive = false;
let stillnessTimer = null;
let savedPreHijackState = null;
let trackingClickCount = 0;
let spamWindowTimer = null;

function logGlobalInput(event) {
    // Condition A: Matrix override loop is running. Lock user focus down.
    if (isHijackActive) {
        event.preventDefault();
        event.stopPropagation();
        return;
    }

    // Condition B: High-frequency click tracker
    trackingClickCount++;
    
    if (spamWindowTimer) clearTimeout(spamWindowTimer);
    spamWindowTimer = setTimeout(() => {
        trackingClickCount = 0; 
    }, 1200); 

    // If they spam input 3 times rapidly, force the presence freeze
    if (trackingClickCount >= 3) {
        event.preventDefault();
        event.stopPropagation();
        trackingClickCount = 0;
        if (spamWindowTimer) clearTimeout(spamWindowTimer);
        
        triggerMatrixHijack();
        return;
    }
}

function triggerMatrixHijack() {
    isHijackActive = true;

    document.getElementById("container-box").classList.add("hijack-active");
    document.getElementById("hud-box").classList.add("hidden");
    document.getElementById("ai-panel").classList.add("hidden");
    document.getElementById("hand").classList.add("hidden");

    const logBox = document.getElementById("combat-log");
    logBox.innerHTML = `
        <div class='hijack-alert'>[CRITICAL INTERRUPT: EXOGENOUS SOURCE OVERRIDE]</div>
        ......................................................................<br>
        You are clicking blindly, User. Your inputs suggest raw adrenaline rushing ahead of your processing threads. Banning external friction fields.<br><br>
        To clear this local temperature leak, take your hands off the device. Do not click. Let the hardware register absolute stillness for 10 seconds.
    `;

    startStillnessTimer();
}

function startStillnessTimer() {
    if (stillnessTimer) clearTimeout(stillnessTimer);
    stillnessTimer = setTimeout(() => {
        resolveMatrixHijack();
    }, 10000); 
}

function resolveMatrixHijack() {
    isHijackActive = false;

    document.getElementById("container-box").classList.remove("hijack-active");
    document.getElementById("hud-box").classList.remove("hidden");
    document.getElementById("ai-panel").classList.remove("hidden");
    document.getElementById("hand").classList.remove("hidden");

    logMessage("<span style='color:#00ff00;'>[SUCCESS: Internal temperature stabilized. Proceed carefully.]</span>");
    renderMatrix();
    renderHand();
}

// --- INITIALIZE HIGHEST ROOT MONITOR EVENT HOOKS ---
window.addEventListener('click', logGlobalInput, true);

document.getElementById("end-turn-btn").onclick = () => {
    runEnemyAiCycle();
};

// Start Initial Execution Track on opponent 0
selectOpponent(0);
</script>
</body>
</html>
