html<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thermal Nexus: Pyrodynamic Prototype</title>
    <style>
        body { 
            font-family: monospace; 
            background: #120703; 
            color: #ff6600; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            box-sizing: border-box;
            position: relative;
        }
        .game-layout { 
            max-width: 850px; 
            width: 100%; 
            background: #220f06; 
            border: 2px solid #ff4500; 
            border-radius: 8px; 
            padding: 24px; 
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.3); 
            box-sizing: border-box;
        }
        .hud { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid #ff4500; 
            padding-bottom: 12px; 
            font-size: 1rem; 
        }
        .hud strong { color: #ffffff; }
        .ai-select-panel { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin: 15px 0; 
            flex-wrap: wrap;
        }
        .ai-btn { 
            background: #3d1403; 
            color: #ffaa66; 
            border: 1px solid #ff4500; 
            padding: 8px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s;
        }
        .ai-btn:hover { 
            background: #ff4500; 
            color: #000000; 
            box-shadow: 0 0 8px #ff4500;
        }
        .matrix-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 120px); 
            grid-template-rows: repeat(3, 120px); 
            gap: 14px; 
            justify-content: center; 
            margin: 20px auto; 
        }
        .grid-cell { 
            border: 1px dashed #ff6600; 
            background: #1a0a03; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.75rem; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-sizing: border-box; 
            padding: 8px; 
            overflow: hidden;
        }
        .grid-cell:hover { 
            background: rgba(255, 102, 0, 0.2); 
            border-color: #ffffff; 
            transform: scale(1.02);
        }
        .log-box { 
            background: #120703; 
            border: 1px solid #3d1403; 
            border-radius: 4px; 
            padding: 12px; 
            font-size: 0.75rem; 
            height: 95px; 
            overflow-y: auto; 
            color: #ffaa66; 
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .hand-container { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            padding: 15px 0; 
            flex-wrap: wrap;
            min-height: 210px;
        }
        .card { 
            width: 140px; 
            height: 190px; 
            border: 1px solid #ff6600; 
            border-radius: 6px; 
            background: #2d1105; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 12px; 
            box-sizing: border-box; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: #ffffff; 
            box-shadow: 0 0 15px #ff4500; 
        }
        .card-title { 
            font-weight: bold; 
            font-size: 0.8rem; 
            border-bottom: 1px solid #ff4500; 
            padding-bottom: 6px; 
            color: #ffcc99; 
            text-transform: uppercase;
        }
        .card-desc { 
            font-size: 0.65rem; 
            color: #d0a080; 
            flex-grow: 1; 
            margin-top: 8px; 
            line-height: 1.3; 
        }
        .card-cost { 
            align-self: flex-end; 
            font-size: 0.75rem; 
            background: rgba(255, 69, 0, 0.4); 
            padding: 2px 8px; 
            border-radius: 4px; 
            color: #ffffff; 
            font-weight: bold;
        }
        .action-container { 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            margin-top: 10px;
        }
        .action-btn { 
            background: #3d1403; 
            color: #ff6600; 
            border: 1px solid #ff4500; 
            padding: 14px 28px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: bold; 
            font-family: monospace; 
            font-size: 0.95rem;
            transition: all 0.2s;
        }
        .action-btn:hover { 
            background: #ff4500; 
            color: #000000; 
            box-shadow: 0 0 12px #ff4500; 
        }
        .selected { 
            border-color: #ffffff !important; 
            box-shadow: 0 0 15px #ff6600; 
        }
        .hidden { display: none !important; }

        /* ENDGAME LAYER OVERLAYS */
        .game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 7, 3, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 100;
        }
        .game-over-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 15px #ff4500;
        }
    </style>
</head>
<body>

<div class="game-layout" id="container-box">
    <div class="hud" id="hud-box">
        <div>🔥 PLAYER: <strong id="p-hp">20</strong> HP | <strong id="p-cal">3</strong>/3 Calories</div>
        <div>🤖 <span id="ai-name">Pyrolympian-01</span>: <strong id="ai-hp">20</strong> HP</div>
    </div>

    <div class="ai-select-panel" id="ai-panel">
        <button class="ai-btn" onclick="selectOpponent(0)">Engage: Pyrolympian-01</button>
        <button class="ai-btn" onclick="selectOpponent(1)">Engage: Dynamancer-02</button>
        <button class="ai-btn" onclick="selectOpponent(2)">Engage: Flame Beautitian-03</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>
    <div class="log-box" id="combat-log">[SYSTEM_INITIALIZATION]: Volcanic Grid synchronized. Ready to initialize.</div>
    <div class="hand-container" id="hand"></div>

    <div class="action-container">
        <button class="action-btn" id="end-turn-btn" onclick="processCombustionPhase()">TRIGGER COMBUSTION PHASE</button>
    </div>
</div>

<script>
// --- GLOBAL DYNAMIC STATE STORAGE SYSTEM ---
const opponentsRegistry = [
    { name: "Pyrolympian-01 (The Gasifier)", rank: 1, baseHp: 20, style: "Fuel" },
    { name: "Dynamancer-02 (The Chemical Ratio)", rank: 1, baseHp: 22, style: "Oxidizer" },
    { name: "Flame Beautitian-03 (The Subsonic Front)", rank: 1, baseHp: 25, style: "Blast" }
];

const state = {
    activeAiIndex: 0,
    playerHp: 20,
    playerCal: 3,
    aiHp: 20,
    selectedCardIdx: null,
    grid: Array(9).fill(null),       // Holds active uncombusted cards: { title, type, cost, val }
    claimMap: Array(9).fill(null),   // Holds permanent line tokens: "player" or "ai"
    playerHand: [],
    lineWinner: null,
    pool: [
        { title: "Peat Brick", type: "Fuel", cost: 1, val: 2, text: "Ignition point: Low. Spreads 2 raw heating units to its core layer." },
        { title: "Oxygen Jet", type: "Oxidizer", cost: 1, val: 3, text: "Feeds flame streams. Multiplies an active Fuel cell's output parameters by +3." },
        { title: "Char Wood", type: "Fuel", cost: 2, val: 5, text: "High density. Emits 5 massive damage units across uncontained channels." },
        { title: "Backdraft", type: "Blast", cost: 2, val: 4, text: "Tactical flash sweep. Deals 4 damage and clears an adjacent layer." },
        { title: "Magma Pulse", type: "Blast", cost: 3, val: 6, text: "Tectonic eruption waves. Smashes 6 global damage points straight down the core." }
    ]
};

const geoLayers = [
    "Lithosphere", "Asthenosphere", "Upper Mantle",
    "Transition Zone", "Lower Mantle", "D\" Layer (CMB)",
    "Outer Core", "Inner Core", "Sub-Core Terminal"
];

// --- CORE GAME ENGINE INITIALIZER ---
function initGame() {
    state.playerHp = 20;
    state.playerCal = 3;
    state.aiHp = opponentsRegistry[state.activeAiIndex].baseHp;
    state.grid = Array(9).fill(null);
    state.claimMap = Array(9).fill(null);
    state.selectedCardIdx = null;
    state.playerHand = [];
    state.lineWinner = null;
    
    const existingOverlay = document.getElementById("game-over-overlay");
    if(existingOverlay) existingOverlay.remove();

    for (let i = 0; i < 3; i++) {
        drawCard();
    }
    
    logToConsole(`[SYSTEM]: Battle initialized against ${opponentsRegistry[state.activeAiIndex].name}. Achieve 3-in-a-row alignment or drop HP to 0.`);
    updateUiDisplays();
}

function logToConsole(message) {
    const logBox = document.getElementById("combat-log");
    logBox.innerHTML += `<br>${message}`;
    logBox.scrollTop = logBox.scrollHeight;
}

function drawCard() {
    if (state.playerHand.length < 5) {
        const randCard = state.pool[Math.floor(Math.random() * state.pool.length)];
        state.playerHand.push({ ...randCard });
    }
}

// --- RENDERING MANAGEMENT ---
function updateUiDisplays() {
    document.getElementById("p-hp").innerText = state.playerHp;
    document.getElementById("p-cal").innerText = state.playerCal;
Use code with caution.document.getElementById("ai-name").innerText = opponentsRegistry[state.activeAiIndex].name;document.getElementById("ai-hp").innerText = state.aiHp;const matrixBox = document.getElementById("matrix");matrixBox.innerHTML = "";state.grid.forEach((cell, idx) => {const cellElement = document.createElement("div");cellElement.className = "grid-cell";cellElement.onclick = () => assignCardToGrid(idx);// 1. Check if an active uncombusted card sits hereif (cell) {cellElement.style.borderStyle = "solid";cellElement.style.borderColor = "#ffaa00";cellElement.innerHTML = <strong style="color:#ffffff;">${cell.title}</strong><br><span style="color:#ffaa00; font-size:0.6rem;">[READY]</span>;}// 2. Otherwise, check if a player or AI holds permanent token rights hereelse if (state.claimMap[idx]) {cellElement.style.borderStyle = "solid";if (state.claimMap[idx] === "player") {cellElement.style.borderColor = "#58a6ff";cellElement.innerHTML = <span style="color:#58a6ff; font-weight:bold;">🔥 ME</span><br><span style="color:#8b949e; font-size:0.55rem;">${geoLayers[idx]}</span>;} else {cellElement.style.borderColor = "#ff3333";cellElement.innerHTML = <span style="color:#ff3333; font-weight:bold;">🤖 AI</span><br><span style="color:#8b949e; font-size:0.55rem;">${geoLayers[idx]}</span>;}}// 3. Completely vacant slot fallbackelse {cellElement.innerHTML = <span style="color:#3d1403;">${geoLayers[idx]}</span>;}matrixBox.appendChild(cellElement);});const handBox = document.getElementById("hand");handBox.innerHTML = "";state.playerHand.forEach((card, idx) => {const cardElement = document.createElement("div");cardElement.className = card ${state.selectedCardIdx === idx ? 'selected' : ''};cardElement.onclick = () => selectHandCard(idx);cardElement.innerHTML = <div class="card-title">${card.title}</div> <div class="card-desc">${card.text}</div> <div class="card-cost">${card.cost} CAL</div>;handBox.appendChild(cardElement);});checkEndgameConditions();}function selectOpponent(idx) {state.activeAiIndex = idx;initGame();}// Select/unselect a card from your handfunction selectHandCard(idx) {state.selectedCardIdx = state.selectedCardIdx === idx ? null : idx;updateUiDisplays();}function assignCardToGrid(gridIdx) {if (state.selectedCardIdx === null) {logToConsole("[ERROR]: Select a thermal card from your hand interface first!");return;}if (state.grid[gridIdx] !== null || state.claimMap[gridIdx] !== null) {logToConsole("[ERROR]: This geological sequence layer is occupied!");return;}const targetCard = state.playerHand[state.selectedCardIdx];if (state.playerCal < targetCard.cost) {logToConsole("[WARN]: Insufficient Calories to execute thermal loop.");return;}state.playerCal -= targetCard.cost;state.grid[gridIdx] = { ...targetCard };state.claimMap[gridIdx] = "player"; // Lock row token claim coordinates immediatelystate.playerHand.splice(state.selectedCardIdx, 1);state.selectedCardIdx = null;logToConsole([DEPLOYED]: ${targetCard.title} assigned to ${geoLayers[gridIdx]}. Trigger Combustion to fire damage.);updateUiDisplays();}// --- THE FIX: FULLY DEFINED MATRIX MATCH ENGINE ---function checkLineCombinations() {const winningLines = [[0, 1, 4, 5, 6, 7, 8], // Horizontal alignments[0, 6, 1, 4, 7, 5, 8], // Vertical alignments[0, 4, 8, 4, 6]             // Diagonal alignments];for (let line of winningLines) {const [a, b, c] = line;if (state.claimMap[a] && state.claimMap[b] && state.claimMap[c]) {if (state.claimMap[a] === state.claimMap[b] && state.claimMap[b] === state.claimMap[c]) {state.lineWinner = state.claimMap[a];return;}}}}// --- SYSTEM CALCULATOR BURST RESOLUTION LOOP ---function processCombustionPhase() {logToConsole("[COMBUSTION_PHASE]: Extracting values...");let baseDamageYield = 0;let scalingMultiplier = 1;// Calculate total layout metrics from active uncombusted cardsstate.grid.forEach((card, idx) => {if (!card) return;if (card.type === "Fuel") baseDamageYield += card.val;else if (card.type === "Oxidizer") { scalingMultiplier += 0.4; baseDamageYield += card.val; }else if (card.type === "Blast") baseDamageYield += card.val;});const totalFinalDamage = Math.floor(baseDamageYield * scalingMultiplier);if (totalFinalDamage > 0) {state.aiHp -= totalFinalDamage;logToConsole([BURST SUCCESS]: Matrix erupted! Dealt ${totalFinalDamage} damage to opponent.);} else {logToConsole("[INFO]: No pending active cards on grid to combust.");}// Flush active card structures while leaving token values on claimMap intactstate.grid = Array(9).fill(null);// Run matrix check to verify if the player won via damage or linescheckLineCombinations();if (state.aiHp <= 0 || state.lineWinner) {updateUiDisplays();return;}// --- OPPONENT BLOCK ROUTINE COUNTER SYSTEM ---let emptySlots = [];state.claimMap.forEach((token, idx) => { if (token === null) emptySlots.push(idx); });if (emptySlots.length > 0) {// AI selects a random vacant slot to counter-claimconst choiceIdx = emptySlots[Math.floor(Math.random() * emptySlots.length)];state.claimMap[choiceIdx] = "ai";logToConsole([OPPONENT]: AI hijacked the ${geoLayers[choiceIdx]} layer slot.);// Counter baseline strike back to playerconst aiAttackPower = Math.floor(Math.random() * 3) + 2;state.playerHp -= aiAttackPower;logToConsole([COUNTER DAMAGE]: AI hit you back for ${aiAttackPower} damage.);}// End of turn maintenancecheckLineCombinations();state.playerCal = 3;while (state.playerHand.length < 3) {drawCard();}logToConsole("[SYSTEM]: Geological matrices stabilized. Hand cards dealt.");updateUiDisplays();}// --- DISPLAY RE-SYNC END GAME SCREEN OVERLAYS ---function checkEndgameConditions() {if (state.playerHp <= 0 || state.aiHp <= 0 || state.lineWinner !== null) {const overlay = document.createElement("div");overlay.id = "game-over-overlay";overlay.className = "game-over-screen";let headerText = "";let colorTheme = "";if (state.lineWinner === "player") {headerText = "Grid Aligned (Line Victory!)";colorTheme = "#00ff00";} else if (state.lineWinner === "ai") {headerText = "Core Intercepted (Line Defeat!)";colorTheme = "#ff3333";} else if (state.playerHp <= 0 && state.aiHp <= 0) {headerText = "Dual Meltdown (Draw)";colorTheme = "#8b949e";} else if (state.aiHp <= 0) {headerText = "Core Overwhelmed (HP Victory!)";colorTheme = "#00ff00";} else {headerText = "Thermal Freeze (HP Defeat)";colorTheme = "#ff3333";}overlay.innerHTML = <div class="game-over-title" style="color: ${colorTheme}; text-shadow: 0 0 20px ${colorTheme}; font-size:1.8rem; text-align:center;">${headerText}</div> <p style="color: #ffaa66; margin-bottom: 20px; text-align:center;">Pyrodynamic threshold reached parameters.</p> <button class="action-btn" onclick="initGame()">Re-engage Volcanic Grid</button>;document.getElementById("container-box").appendChild(overlay);}}initGame();
