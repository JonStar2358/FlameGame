<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thermal Nexus: Pyrodynamic Prototype</title>
    <style>
        body { 
            font-family: monospace; 
            background: #120703; 
            color: #ff6600; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            box-sizing: border-box;
            position: relative;
        }
        .game-layout { 
            max-width: 850px; 
            width: 100%; 
            background: #220f06; 
            border: 2px solid #ff4500; 
            border-radius: 8px; 
            padding: 24px; 
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.3); 
            box-sizing: border-box;
        }
        .hud { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid #ff4500; 
            padding-bottom: 12px; 
            font-size: 1rem; 
        }
        .hud strong { color: #ffffff; }
        .ai-select-panel { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin: 15px 0; 
            flex-wrap: wrap;
        }
        .ai-btn { 
            background: #3d1403; 
            color: #ffaa66; 
            border: 1px solid #ff4500; 
            padding: 8px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s;
        }
        .ai-btn:hover { 
            background: #ff4500; 
            color: #000000; 
            box-shadow: 0 0 8px #ff4500;
        }
        .matrix-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 120px); 
            grid-template-rows: repeat(3, 120px); 
            gap: 14px; 
            justify-content: center; 
            margin: 20px auto; 
        }
        .grid-cell { 
            border: 1px dashed #ff6600; 
            background: #1a0a03; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.75rem; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-sizing: border-box; 
            padding: 8px; 
            overflow: hidden;
        }
        .grid-cell:hover { 
            background: rgba(255, 102, 0, 0.2); 
            border-color: #ffffff; 
            transform: scale(1.02);
        }
        .log-box { 
            background: #120703; 
            border: 1px solid #3d1403; 
            border-radius: 4px; 
            padding: 12px; 
            font-size: 0.75rem; 
            height: 95px; 
            overflow-y: auto; 
            color: #ffaa66; 
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .hand-container { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            padding: 15px 0; 
            flex-wrap: wrap;
            min-height: 210px;
        }
        .card { 
            width: 140px; 
            height: 190px; 
            border: 1px solid #ff6600; 
            border-radius: 6px; 
            background: #2d1105; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 12px; 
            box-sizing: border-box; 
            cursor: pointer; 
            transition: all 0.2s; 
        }
        .card:hover { 
            transform: translateY(-8px); 
            border-color: #ffffff; 
            box-shadow: 0 0 15px #ff4500; 
        }
        .card-title { 
            font-weight: bold; 
            font-size: 0.8rem; 
            border-bottom: 1px solid #ff4500; 
            padding-bottom: 6px; 
            color: #ffcc99; 
            text-transform: uppercase;
        }
        .card-desc { 
            font-size: 0.65rem; 
            color: #d0a080; 
            flex-grow: 1; 
            margin-top: 8px; 
            line-height: 1.3; 
        }
        .card-cost { 
            align-self: flex-end; 
            font-size: 0.75rem; 
            background: rgba(255, 69, 0, 0.4); 
            padding: 2px 8px; 
            border-radius: 4px; 
            color: #ffffff; 
            font-weight: bold;
        }
        .game-over-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(18, 7, 3, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            z-index: 100;
        }
        .game-over-title {
            font-size: 2.2rem;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            text-shadow: 0 0 15px #ff4500;
        }
    </style>
</head>
<body>

<div class="game-layout" id="container-box">
    <div class="hud" id="hud-box">
        <div>🔥 PLAYER: <strong id="p-hp">20</strong> HP | <strong id="p-cal">3</strong>/3 Calories</div>
        <div>🤖 <span id="ai-name">Pyrolympian-01</span>: <strong id="ai-hp">20</strong> HP</div>
    </div>

    <div class="ai-select-panel" id="ai-panel">
        <button class="ai-btn" onclick="selectOpponent(0)">Engage: Pyrolympian-01</button>
        <button class="ai-btn" onclick="selectOpponent(1)">Engage: Dynamancer-02</button>
        <button class="ai-btn" onclick="selectOpponent(2)">Engage: Flame Beautitian-03</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>
    <div class="log-box" id="combat-log">[SYSTEM_INITIALIZATION]: Volcanic Grid synchronized. Ready to initialize.</div>
    <div class="hand-container" id="hand"></div>

    <div class="action-container" style="display:flex; justify-content:center; gap:15px; margin-top:10px;">
        <button class="action-btn" id="end-turn-btn" onclick="processCombustionPhase()">TRIGGER COMBUSTION PHASE</button>
    </div>
</div>

<script>
// --- INITIAL DATA ASSIGNMENT SYSTEM ---
var opponentsRegistry = [
    { name: "Pyrolympian-01 (The Gasifier)", baseHp: 20 },
    { name: "Dynamancer-02 (The Chemical Ratio)", baseHp: 22 },
    { name: "Flame Beautitian-03 (The Subsonic Front)", baseHp: 25 }
];

var state = {
    activeAiIndex: 0,
    playerHp: 20,
    playerCal: 3,
    aiHp: 20,
    selectedCardIdx: null,
    grid: [null, null, null, null, null, null, null, null, null],
    claimMap: [null, null, null, null, null, null, null, null, null],
    playerHand: [],
    lineWinner: null,
    pool: [
        { title: "Peat Brick", type: "Fuel", cost: 1, val: 2, text: "Ignition point: Low. Spreads 2 heating units to its layer." },
        { title: "Oxygen Jet", type: "Oxidizer", cost: 1, val: 3, text: "Feeds flame streams. Multiplies Fuel cell damage by +1.4x." },
        { title: "Char Wood", type: "Fuel", cost: 2, val: 5, text: "High density. Emits 5 massive damage units down uncontained channels." },
        { title: "Backdraft", type: "Blast", cost: 2, val: 4, text: "Tactical flash sweep. Deals 4 structural damage across the grid." },
        { title: "Magma Pulse", type: "Blast", cost: 3, val: 6, text: "Tectonic eruption waves. Smashes 6 global damage points straight down." }
    ]
};

var geoLayers = [
    "Lithosphere", "Asthenosphere", "Upper Mantle",
    "Transition Zone", "Lower Mantle", "D\" Layer (CMB)",
    "Outer Core", "Inner Core", "Sub-Core Terminal"
];

// --- TEXT-STRING-BASED SCANNER MACHINE ---
function checkLineWinner(a, b, c) {
    var ownerA = state.claimMap[a];
    var ownerB = state.claimMap[b];
    var ownerC = state.claimMap[c];
    if (ownerA !== null && ownerA === ownerB && ownerB === ownerC) {
        state.lineWinner = ownerA;
        return true;
    }
    return false;
}

function verifyMatrixGridMatches() {
    if (checkLineWinner(0, 1, 2)) return;
    if (checkLineWinner(3, 4, 5)) return;
    if (checkLineWinner(6, 7, 8)) return;
    if (checkLineWinner(0, 3, 6)) return;
    if (checkLineWinner(1, 4, 7)) return;
    if (checkLineWinner(2, 5, 8)) return;
    if (checkLineWinner(0, 4, 8)) return;
    if (checkLineWinner(2, 4, 6)) return;
}

// --- INTERACTIVE ACTIONS & GAME LOOP PIPELINE ---
function updateUiDisplays() {
    document.getElementById("p-hp").innerText = state.playerHp;
    document.getElementById("p-cal").innerText = state.playerCal;
    
    var currentOpponent = opponentsRegistry[state.activeAiIndex] || { name: "Unknown Entity", baseHp: 20 };
    document.getElementById("ai-name").innerText = currentOpponent.name;
    document.getElementById("ai-hp").innerText = state.aiHp;

    var matrixBox = document.getElementById("matrix");
    matrixBox.innerHTML = "";
    
    state.grid.forEach(function(cell, idx) {
        var cellElement = document.createElement("div");
        cellElement.className = "grid-cell";
        cellElement.onclick = function() { assignCardToGrid(idx); };
        
        if (cell) {
            cellElement.style.borderStyle = "solid";
            cellElement.style.borderColor = "#ffaa00";
            cellElement.innerHTML = "<strong style='color:#ffffff;'>" + cell.title + "</strong><br><span style='color:#ffaa00; font-size:0.6rem;'>[READY]</span>";
        } 
        else if (state.claimMap[idx]) {
            cellElement.style.borderStyle = "solid";
            if (state.claimMap[idx] === "player") {
                cellElement.style.borderColor = "#58a6ff";
                cellElement.innerHTML = "<span style='color:#58a6ff; font-weight:bold;'>🔥 ME</span><br><span style='color:#8b949e; font-size:0.55rem;'>" + geoLayers[idx] + "</span>";
            } else {
                cellElement.style.borderColor = "#ff3333";
cellElement.innerHTML = "🤖 AI" + geoLayers[idx] + "";}}else {cellElement.innerHTML = "" + geoLayers[idx] + "";}matrixBox.appendChild(cellElement);});var handBox = document.getElementById("hand");handBox.innerHTML = "";state.playerHand.forEach(function(card, idx) {var cardElement = document.createElement("div");cardElement.className = "card " + (state.selectedCardIdx === idx ? "selected" : "");cardElement.onclick = function() { selectHandCard(idx); };cardElement.innerHTML = <div class="card-title">${card.title}</div> <div class="card-desc">${card.text}</div> <div class="card-cost">${card.cost} CAL</div>;handBox.appendChild(cardElement);});checkEndgameConditions();}function initGame() {state.playerHp = 20;state.playerCal = 3;var activeOpponent = opponentsRegistry[state.activeAiIndex] || { name: "Unknown Entity", baseHp: 20 };state.aiHp = activeOpponent.baseHp || 20;state.grid = [null, null, null, null, null, null, null, null, null];state.claimMap = [null, null, null, null, null, null, null, null, null];state.selectedCardIdx = null;state.playerHand = [];state.lineWinner = null;var existingOverlay = document.getElementById("game-over-overlay");if (existingOverlay) existingOverlay.remove();for (var i = 0; i < 3; i++) {drawCard();}logToConsole("[SYSTEM]: Core breach engaged against " + activeOpponent.name + ".");updateUiDisplays();}function selectOpponent(idx) {state.activeAiIndex = idx;initGame();}function logToConsole(message) {var logBox = document.getElementById("combat-log");if (logBox) {logBox.innerHTML += "" + message;logBox.scrollTop = logBox.scrollHeight;}}function drawCard() {if (state.playerHand.length < 5) {var randCard = state.pool[Math.floor(Math.random() * state.pool.length)];state.playerHand.push(Object.assign({}, randCard));}}function selectHandCard(idx) {state.selectedCardIdx = state.selectedCardIdx === idx ? null : idx;updateUiDisplays();}function assignCardToGrid(gridIdx) {if (state.selectedCardIdx === null) {logToConsole("[ERROR]: Select a thermal card from your hand interface first!");return;}if (state.grid[gridIdx] !== null || state.claimMap[gridIdx] !== null) {logToConsole("[ERROR]: This geological sequence layer is occupied!");return;}var targetCard = state.playerHand[state.selectedCardIdx];if (state.playerCal < targetCard.cost) {logToConsole("[WARN]: Insufficient Calories to execute thermal loop.");return;}state.playerCal -= targetCard.cost;state.grid[gridIdx] = Object.assign({}, targetCard);state.claimMap[gridIdx] = "player";state.playerHand.splice(state.selectedCardIdx, 1);state.selectedCardIdx = null;logToConsole("[DEPLOYED]: " + targetCard.title + " assigned to " + geoLayers[gridIdx] + ".");updateUiDisplays();}function processCombustionPhase() {logToConsole("[COMBUSTION_PHASE]: Extracting values...");var baseDamageYield = 0;var scalingMultiplier = 1;state.grid.forEach(function(card) {if (!card) return;if (card.type === "Fuel") baseDamageYield += card.val;else if (card.type === "Oxidizer") { scalingMultiplier += 0.4; baseDamageYield += card.val; }else if (card.type === "Blast") baseDamageYield += card.val;});var totalFinalDamage = Math.floor(baseDamageYield * scalingMultiplier);if (totalFinalDamage > 0) {state.aiHp -= totalFinalDamage;logToConsole("[BURST SUCCESS]: Matrix erupted! Dealt " + totalFinalDamage + " damage to opponent.");} else {logToConsole("[INFO]: No pending active cards on grid to combust.");}state.grid = [null, null, null, null, null, null, null, null, null];verifyMatrixGridMatches();if (state.aiHp <= 0 || state.lineWinner) {updateUiDisplays();return;}// --- OPPONENT COUNTER ACTION TRACKER ---var emptySlots = [];state.claimMap.forEach(function(token, idx) { if (token === null) emptySlots.push(idx); });if (emptySlots.length > 0) {var choiceIdx = emptySlots[Math.floor(Math.random() * emptySlots.length)];state.claimMap[choiceIdx] = "ai";logToConsole("[OPPONENT]: AI hijacked the " + geoLayers[choiceIdx] + " layer slot.");var aiAttackPower = Math.floor(Math.random() * 3) + 2;state.playerHp -= aiAttackPower;logToConsole("[COUNTER DAMAGE]: AI hit you back for " + aiAttackPower + " damage.");}verifyMatrixGridMatches();state.playerCal = 3;while (state.playerHand.length < 3) {drawCard();}logToConsole("[SYSTEM]: Geological matrices stabilized. Hand cards dealt.");updateUiDisplays();}function checkEndgameConditions() {if (state.playerHp <= 0 || state.aiHp <= 0 || state.lineWinner !== null) {var overlay = document.createElement("div");overlay.id = "game-over-overlay";overlay.className = "game-over-screen";var headerText = "";var colorTheme = "";if (state.lineWinner === "player") {headerText = "Grid Aligned (Line Victory!)";colorTheme = "#00ff00";} else if (state.lineWinner === "ai") {headerText = "Core Intercepted (Line Defeat!)";colorTheme = "#ff3333";} else if (state.playerHp <= 0 && state.aiHp <= 0) {headerText = "Dual Meltdown (Draw)";colorTheme = "#8b949e";} else if (state.aiHp <= 0) {headerText = "Core Overwhelmed (HP Victory!)";colorTheme = "#00ff00";} else {headerText = "Thermal Freeze (HP Defeat)";colorTheme = "#ff3333";}overlay.innerHTML = <div class="game-over-title" style="color: ${colorTheme}; text-shadow: 0 0 20px ${colorTheme}; text-align:center;">${headerText}</div> <p style="color: #ffaa66; margin-bottom: 20px; text-align:center;">Pyrodynamic threshold reached parameters.</p> <button class="action-btn" onclick="initGame()">Re-engage Volcanic Grid</button>;document.getElementById("container-box").appendChild(overlay);}}// Initial initialization load linkinitGame();
