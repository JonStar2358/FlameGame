<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Thermal Nexus: Pyrodynamic Prototype</title>
    <style>
        body { 
            font-family: monospace; 
            background: #120703; 
            color: #ff6600; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 15px; 
            box-sizing: border-box;
        }
        .game-layout { 
            max-width: 850px; 
            width: 100%; 
            background: #220f06; 
            border: 2px solid #ff4500; 
            border-radius: 8px; 
            padding: 24px; 
            box-shadow: 0 0 25px rgba(255, 69, 0, 0.3); 
            box-sizing: border-box;
        }
        .hud { 
            display: flex; 
            justify-content: space-between; 
            border-bottom: 2px solid #ff4500; 
            padding-bottom: 12px; 
            font-size: 1rem; 
        }
        .hud strong { color: #ffffff; }
        .ai-select-panel { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            margin: 15px 0; 
            flex-wrap: wrap;
        }
        .ai-btn { 
            background: #3d1403; 
            color: #ffaa66; 
            border: 1px solid #ff4500; 
            padding: 8px 16px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-family: monospace;
            font-weight: bold;
            transition: all 0.2s;
        }
        .ai-btn:hover { 
            background: #ff4500; 
            color: #000000; 
            box-shadow: 0 0 8px #ff4500;
        }
        .matrix-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 130px); 
            grid-template-rows: repeat(3, 130px); 
            gap: 14px; 
            justify-content: center; 
            margin: 20px auto; 
            position: relative;
        }
        .grid-cell { 
            border: 2px solid #ff6600; 
            background: linear-gradient(135deg, #1a0a03 0%, #2d1105 100%);
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            font-size: 0.8rem; 
            text-align: center; 
            cursor: pointer; 
            transition: all 0.2s; 
            box-sizing: border-box; 
            padding: 8px; 
            overflow: hidden;
            color: #ffaa66;
            position: relative;
        }
        .grid-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 30% 30%, rgba(255, 102, 0, 0.1), transparent);
            pointer-events: none;
        }
        .grid-cell:hover { 
            background: linear-gradient(135deg, #2d1105 0%, #3d1105 100%);
            border-color: #ffffff; 
            transform: scale(1.05);
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.4);
        }
        .grid-cell.claimed-player {
            border: 2px solid #ff3300;
            background: linear-gradient(135deg, rgba(255, 51, 0, 0.3) 0%, rgba(255, 102, 0, 0.2) 100%);
            color: #ffffff;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(255, 51, 0, 0.3);
        }
        .grid-cell.claimed-comp {
            border: 2px solid #33ccff;
            background: linear-gradient(135deg, rgba(51, 204, 255, 0.3) 0%, rgba(0, 150, 200, 0.2) 100%);
            color: #ffffff;
            font-weight: bold;
            box-shadow: inset 0 0 10px rgba(51, 204, 255, 0.3);
        }
        .cell-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }
        .cell-emoji {
            font-size: 2.5rem;
            min-height: 2.5rem;
        }
        .cell-label {
            font-size: 0.7rem;
            opacity: 0.7;
        }
        .log-box { 
            background: #120703; 
            border: 1px solid #3d1403; 
            border-radius: 4px; 
            padding: 12px; 
            font-size: 0.75rem; 
            height: 95px; 
            overflow-y: auto; 
            color: #ffaa66; 
            line-height: 1.4;
            margin-bottom: 15px;
        }
        .hand-container { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            padding: 15px 0; 
            flex-wrap: wrap;
            min-height: 210px;
        }
        .card { 
            width: 140px; 
            height: 190px; 
            border: 2px solid #ff6600; 
            border-radius: 6px; 
            background: linear-gradient(135deg, #2d1105 0%, #3d1403 100%);
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            padding: 12px; 
            box-sizing: border-box; 
            cursor: pointer; 
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255, 69, 0, 0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        .card:hover, .card.selected { 
            transform: translateY(-12px); 
            border-color: #ffffff; 
            box-shadow: 0 0 20px #ff4500; 
        }
        .card.selected {
            background: linear-gradient(135deg, #5a1e05 0%, #7a2e05 100%);
            border-color: #ffcc00;
            box-shadow: 0 0 30px #ffcc00;
        }
        .card-title { 
            font-weight: bold; 
            font-size: 0.85rem; 
            border-bottom: 2px solid #ff4500; 
            padding-bottom: 6px; 
            color: #ffcc99; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .card-desc { 
            font-size: 0.65rem; 
            color: #d0a080; 
            flex-grow: 1; 
            margin-top: 8px; 
            line-height: 1.3; 
            font-style: italic;
        }
        .card-effect {
            font-size: 0.6rem;
            color: #ffcc00;
            font-weight: bold;
            margin-top: 4px;
            padding-top: 4px;
            border-top: 1px solid #ff4500;
        }
        .card-emoji {
            font-size: 2rem;
            margin: 4px 0;
        }
        .action-btn {
            background: #ff4500;
            color: white;
            border: none;
            padding: 10px 20px;
            font-family: monospace;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover {
            background: #ff6600;
            box-shadow: 0 0 10px #ff6600;
        }
        
        /* WIN DECLARATION MODAL */
        .win-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-in;
        }
        
        .win-overlay.active {
            display: flex;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .win-declaration {
            text-align: center;
            padding: 40px;
            border: 3px solid #ffcc00;
            border-radius: 12px;
            background: linear-gradient(135deg, #220f06 0%, #3d1403 100%);
            box-shadow: 0 0 50px #ffcc00, 0 0 100px #ff4500;
            animation: pulse 0.6s ease-in-out;
            max-width: 500px;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(0.9); }
            50% { transform: scale(1.05); }
        }
        
        .win-declaration h1 {
            font-size: 3rem;
            color: #ffcc00;
            margin: 0;
            text-shadow: 0 0 20px #ff4500;
            letter-spacing: 3px;
        }
        
        .win-declaration .emoji {
            font-size: 4rem;
            margin: 20px 0;
            animation: bounce 0.6s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .win-declaration p {
            font-size: 1.2rem;
            color: #ffaa66;
            margin: 15px 0;
            font-weight: bold;
        }
        
        .win-declaration .subtext {
            font-size: 0.9rem;
            color: #ff6600;
            font-style: italic;
            margin-top: 20px;
        }

        .extra-turn-banner {
            display: none;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #ffcc00 0%, #ff6600 100%);
            color: #000000;
            padding: 15px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 0 30px #ffcc00;
            z-index: 999;
            animation: slideDown 0.5s ease-out;
            letter-spacing: 2px;
        }

        .extra-turn-banner.active {
            display: block;
        }

        @keyframes slideDown {
            from { 
                transform: translateX(-50%) translateY(-50px);
                opacity: 0;
            }
            to { 
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>

<div class="extra-turn-banner" id="extra-turn-banner">
    ⚡ EXTRA TURN GRANTED! ⚡
</div>

<div class="game-layout">
    <div class="hud">
        <div>🔥 PLAYER: <strong id="p-hp">20</strong> HP</div>
        <div>🤖 <span id="comp-name">Pyrolympian</span> (EVO <strong id="comp-evo">1</strong>): <strong id="comp-hp">20</strong> HP</div>
    </div>

    <div class="ai-select-panel">
        <button class="ai-btn" onclick="selectOpponent(0)">Engage: Pyrolympian</button>
        <button class="ai-btn" onclick="selectOpponent(1)">Engage: Dynamancer</button>
        <button class="ai-btn" onclick="selectOpponent(2)">Engage: Flame Beautician</button>
    </div>

    <div class="matrix-grid" id="matrix"></div>
    <div class="log-box" id="combat-log">[SYSTEM_INITIALIZATION]: Geothermal Grid active. Scripted Computer Opponents ready.</div>
    <div class="hand-container" id="hand"></div>

    <div style="display:flex; justify-content:center; margin-top:10px;">
        <button class="action-btn" onclick="resetGameMatch(true)">RESET MATCH</button>
    </div>
</div>

<div class="win-overlay" id="win-overlay">
    <div class="win-declaration" id="win-declaration">
        <div class="emoji" id="win-emoji">🔥</div>
        <h1 id="win-title">VICTORY!</h1>
        <p id="win-message">Thermal Dominance Achieved</p>
        <div class="subtext">Realigning the geothermal matrix...</div>
    </div>
</div>

<script>
// --- GEOLOGICAL TILES DESIGNATION ---
var geoLayers = [
    "Lithosphere", "Asthenosphere", "Upper Mantle",
    "Transition Zone", "Lower Mantle", "Abyssal Mantle",
    "Outer Core", "Inner Core", "Sub-Core Terminal"
];

// --- ARTISTIC MOVE NAMES AND ABILITIES ---
var moveLibrary = [
    { 
        title: "Infernal Kiss", 
        emoji: "💋",
        text: "A seductive dance of flames ignites the deep.",
        effect: "EXTRA TURN",
        ability: function() {
            showExtraTurnBanner();
            return true; // signals extra turn
        }
    },
    { 
        title: "Magma's Whisper", 
        emoji: "🌋",
        text: "The earth speaks in molten tongues.",
        effect: null,
        ability: function() { return false; }
    },
    { 
        title: "Pyroclastic Ballet", 
        emoji: "🔥",
        text: "A graceful eruption of ash and fire.",
        effect: null,
        ability: function() { return false; }
    },
    { 
        title: "Thermal Waltz", 
        emoji: "💃",
        text: "A mesmerizing spiral of heat and pressure.",
        effect: null,
        ability: function() { return false; }
    },
    { 
        title: "Inferno's Dream", 
        emoji: "✨",
        text: "Reality bends where fire touches stone.",
        effect: null,
        ability: function() { return false; }
    }
];

// --- COMPUTER OPPONENT ARRAY WITH BEHAVIOR MODIFIERS ---
var opponentsRegistry = [
    { name: "Pyrolympian", baseHp: 20, evolutionLevel: 1 },
    { name: "Dynamancer", baseHp: 22, evolutionLevel: 1 },
    { name: "Flame Beautician", baseHp: 25, evolutionLevel: 1 }
];

var state = {
    activeCompIndex: 0,
    playerHp: 20,
    compHp: 20,
    selectedCardIdx: null,
    claimMap: [null, null, null, null, null, null, null, null, null],
    moveMap: [null, null, null, null, null, null, null, null, null],
    playerHand: [],
    isProcessing: false,
    extraTurnActive: false
};

// --- STATIC WIN LINES MATRIX INDEXES ---
var winLines = [
    [0, 1, 2],
    [3, 4, 5],
    [6, 7, 8],
    [0, 3, 6],
    [1, 4, 7],
    [2, 5, 8],
    [0, 4, 8],
    [2, 4, 6]
];

function writeLog(msg) {
    var logBox = document.getElementById("combat-log");
    logBox.innerHTML += "<br>" + msg;
    logBox.scrollTop = logBox.scrollHeight;
}

function showExtraTurnBanner() {
    var banner = document.getElementById("extra-turn-banner");
    banner.classList.add("active");
    setTimeout(() => {
        banner.classList.remove("active");
    }, 2000);
}

function initGameEngine() {
    var matrixContainer = document.getElementById("matrix");
    matrixContainer.innerHTML = "";
    
    for (var i = 0; i < 9; i++) {
        var cell = document.createElement("div");
        cell.className = "grid-cell";
        cell.id = "cell-" + i;
        cell.setAttribute("onclick", "executePlayerMove(" + i + ")");
        cell.innerHTML = `
            <div class="cell-content">
                <div class="cell-emoji" id="emoji-${i}"></div>
                <div class="cell-label">[${i}] ${geoLayers[i]}</div>
            </div>
        `;
        matrixContainer.appendChild(cell);
    }
    
    drawPlayerHand();
    updateHudDisplay();
}

function selectOpponent(idx) {
    state.activeCompIndex = idx;
    var comp = opponentsRegistry[idx];
    writeLog(`[TARGET_CHANGED]: Now fighting ${comp.name}. Tier ${comp.evolutionLevel} Script active.`);
    resetGameMatch(true);
}

function resetGameMatch(fullReset) {
    var comp = opponentsRegistry[state.activeCompIndex];
    state.claimMap = [null, null, null, null, null, null, null, null, null];
    state.moveMap = [null, null, null, null, null, null, null, null, null];
    state.selectedCardIdx = null;
    state.isProcessing = false;
    state.extraTurnActive = false;
    
    if (fullReset) {
        state.playerHp = 20;
        state.compHp = comp.baseHp;
    }
    
    initGameEngine();
    writeLog(`[GRID_RESET]: Board venting channels flushed clear.`);
}

function drawPlayerHand() {
    var handContainer = document.getElementById("hand");
    handContainer.innerHTML = "";
    state.playerHand = [];
    
    for (var i = 0; i < 3; i++) {
        var randCard = moveLibrary[Math.floor(Math.random() * moveLibrary.length)];
        state.playerHand.push(randCard);
        
        var cardEl = document.createElement("div");
        cardEl.className = "card";
        cardEl.id = "card-" + i;
        cardEl.setAttribute("onclick", "selectHandCard(" + i + ")");
        
        var effectHTML = randCard.effect ? `<div class="card-effect">⚡ ${randCard.effect}</div>` : '';
        
        cardEl.innerHTML = `
            <div class="card-emoji">${randCard.emoji}</div>
            <div class="card-title">${randCard.title}</div>
            <div class="card-desc">${randCard.text}</div>
            ${effectHTML}
        `;
        handContainer.appendChild(cardEl);
    }
}

function selectHandCard(idx) {
    if (state.isProcessing) return;
    
    for(var i=0; i<3; i++) {
        var el = document.getElementById("card-"+i);
        if(el) el.classList.remove("selected");
    }
    state.selectedCardIdx = idx;
    document.getElementById("card-"+idx).classList.add("selected");
    writeLog(`[MOVE_LOADED]: Preparing ${state.playerHand[idx].title}. Strike a tectonic layer.`);
}

function updateHudDisplay() {
    var comp = opponentsRegistry[state.activeCompIndex];
    document.getElementById("p-hp").innerText = state.playerHp;
    document.getElementById("comp-name").innerText = comp.name;
    document.getElementById("comp-evo").innerText = comp.evolutionLevel;
    document.getElementById("comp-hp").innerText = state.compHp;
    
    for (var i = 0; i < 9; i++) {
        var cell = document.getElementById("cell-" + i);
        var emojiEl = document.getElementById("emoji-" + i);
        
        if (state.claimMap[i] === 'PLAYER') {
            cell.className = "grid-cell claimed-player";
            emojiEl.innerText = state.moveMap[i] ? state.moveMap[i].emoji : "";
        } else if (state.claimMap[i] === 'COMP') {
            cell.className = "grid-cell claimed-comp";
            emojiEl.innerText = state.moveMap[i] ? state.moveMap[i].emoji : "";
        } else {
            cell.className = "grid-cell";
            emojiEl.innerText = "";
        }
    }
}

function evaluateVictoryCondition() {
    for (var i = 0; i < winLines.length; i++) {
        var line = winLines[i];
        if (state.claimMap[line[0]] && state.claimMap[line[0]] === state.claimMap[line[1]] && state.claimMap[line[1]] === state.claimMap[line[2]]) {
            return state.claimMap[line[0]]; 
        }
    }
    if (!state.claimMap.includes(null)) return 'TIE';
    return null;
}

function executePlayerMove(index) {
    if (state.isProcessing) {
        writeLog("[PROCESSING]: Wait for the thermal cascade to complete.");
        return;
    }
    
    if (state.selectedCardIdx === null) {
        writeLog("[DENIED]: Select a thermal action card first.");
        return;
    }
    if (state.claimMap[index] !== null) {
        writeLog("[OCCUPIED]: Layer stabilized. Pick a structural opening.");
        return;
    }
    
    state.isProcessing = true;
    var card = state.playerHand[state.selectedCardIdx];

    state.claimMap[index] = 'PLAYER';
    state.moveMap[index] = card;
    writeLog(`[PLAYER]: Unleashed ${card.title} upon the **${geoLayers[index]}**! ${card.emoji}`);
    
    state.selectedCardIdx = null;
    drawPlayerHand();
    updateHudDisplay();
    
    var checkWin = evaluateVictoryCondition();
    if (checkWin) {
        processMatchOutcome(checkWin);
        return;
    }
    
    // Check if move grants extra turn
    var hasExtraTurn = card.ability();
    
    if (hasExtraTurn) {
        state.isProcessing = false;
        writeLog(`[INFERNAL KISS]: The seductive flames grant you another move!`);
    } else {
        // Execute computer turn after player move
        setTimeout(() => { executeComputerScriptTurn(); }, 1000);
    }
}

function executeComputerScriptTurn() {
    var comp = opponentsRegistry[state.activeCompIndex];
    var tier = comp.evolutionLevel;
    var choice = null;

    // TIER 2 & 3: Scan for an instant matching row to win OR an instant threat row to block
    if (tier >= 2) {
        // Look to win
        for (var i = 0; i < winLines.length; i++) {
            var line = winLines[i];
            var compOwned = line.filter(idx => state.claimMap[idx] === 'COMP').length;
            var emptyCells = line.filter(idx => state.claimMap[idx] === null).length;
            if (compOwned === 2 && emptyCells === 1) {
                choice = line.find(idx => state.claimMap[idx] === null);
                break;
            }
        }
        // Look to block human
        if (choice === null) {
            for (var i = 0; i < winLines.length; i++) {
                var line = winLines[i];
                var playOwned = line.filter(idx => state.claimMap[idx] === 'PLAYER').length;
                var emptyCells = line.filter(idx => state.claimMap[idx] === null).length;
                if (playOwned === 2 && emptyCells === 1) {
                    choice = line.find(idx => state.claimMap[idx] === null);
                    break;
                }
            }
        }
    }

    // TIER 3: Lock down structural focal layers
    if (tier === 3 && choice === null) {
        var highValueNodes = [4, 5];
        for (var j = 0; j < highValueNodes.length; j++) {
            if (state.claimMap[highValueNodes[j]] === null) {
                choice = highValueNodes[j];
                break;
            }
        }
    }

    // FALLBACK / TIER 1: Select a random remaining node
    if (choice === null) {
        var opens = [];
        for (var i = 0; i < 9; i++) {
            if (state.claimMap[i] === null) opens.push(i);
        }
        if (opens.length > 0) {
            choice = opens[Math.floor(Math.random() * opens.length)];
        }
    }

    // Commit choice to the board with random move
    if (choice !== null) {
        var compMove = moveLibrary[Math.floor(Math.random() * moveLibrary.length)];
        state.claimMap[choice] = 'COMP';
        state.moveMap[choice] = compMove;
        writeLog(`🤖 [${comp.name.toUpperCase()}]: Unleashed ${compMove.title} over the **${geoLayers[choice]}**! ${compMove.emoji}`);
        updateHudDisplay();
        
        var checkWin = evaluateVictoryCondition();
        if (checkWin) {
            processMatchOutcome(checkWin);
        } else {
            state.isProcessing = false;
        }
    }
}

function showWinDeclaration(emoji, title, message) {
    var overlay = document.getElementById("win-overlay");
    document.getElementById("win-emoji").innerText = emoji;
    document.getElementById("win-title").innerText = title;
    document.getElementById("win-message").innerText = message;
    overlay.classList.add("active");
}

function hideWinDeclaration() {
    var overlay = document.getElementById("win-overlay");
    overlay.classList.remove("active");
}

function processMatchOutcome(winner) {
    var comp = opponentsRegistry[state.activeCompIndex];
    
    if (winner === 'PLAYER') {
        state.compHp -= 10;
        writeLog(`💥 [BURST]: You aligned the thermal matrix! ${comp.name} takes 10 damage.`);
        
        showWinDeclaration("🏆", "THERMAL NEXUS!", `${comp.name} overwhelmed!`);
        
        if(state.compHp <= 0) {
            if(comp.evolutionLevel < 3) {
                comp.evolutionLevel++;
                writeLog(`🚨 [EVOLUTION]: ${comp.name} structural analysis complete. Upgrading to Tier ${comp.evolutionLevel}!`);
                showWinDeclaration("⚡", "EVOLUTION!", `${comp.name} grows stronger!`);
            } else {
                writeLog(`🏆 [VICTORY]: You completely neutralized the apex tier of ${comp.name}!`);
                showWinDeclaration("👑", "ABSOLUTE VICTORY!", `${comp.name} vanquished!`);
            }
            state.compHp = comp.baseHp + (comp.evolutionLevel * 5);
        }
    } else if (winner === 'COMP') {
        state.playerHp -= 10;
        writeLog(`💀 [COLLAPSE]: ${comp.name} aligned the fatal vector. You take 10 damage.`);
        showWinDeclaration("🔥", "THERMAL COLLAPSE!", `${comp.name} dominates!`);
    } else if (winner === 'TIE') {
        writeLog("⚖️ [EQUILIBRIUM]: Thermal feedback balanced out. Grid resetting.");
        showWinDeclaration("⚖️", "EQUILIBRIUM", "Forces balanced...");
    }
    
    if(state.playerHp <= 0) {
        writeLog("💥 [GAME_OVER]: Subterranean core overload. System restarting.");
        state.playerHp = 20;
        showWinDeclaration("💥", "SYSTEM FAILURE", "Rebooting...");
    }
    
    setTimeout(() => { hideWinDeclaration(); }, 3000);
    setTimeout(() => { resetGameMatch(false); }, 3200);
}

window.onload = function() {
    initGameEngine();
};
</script>
</body>
</html>
